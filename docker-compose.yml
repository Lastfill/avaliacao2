version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: avaliador_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha_segura_123}
      POSTGRES_DB: ${DB_NAME:-avaliador_rio}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata: